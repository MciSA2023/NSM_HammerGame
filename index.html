<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aatm Manthan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="exhibition-scene">
        <div id="sky-background"></div>
        <div id="storm-overlay"></div>

        <canvas id="rain-canvas"></canvas>

        <div id="ground"></div>

        <div id="person-wrapper">

            <div id="person-colorful">
                <svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 60 100 C 60 50, 140 50, 140 100 L 140 400 L 60 400 Z" fill="#f1c40f" />
                    <circle cx="100" cy="80" r="40" fill="#f39c12" />
                    <text x="100" y="250" font-family="sans-serif" font-size="30" font-weight="bold" fill="#ffffff"
                        text-anchor="middle" transform="rotate(-90 100 250)">LOVE</text>
                </svg>
            </div>

            <div id="person-cover">
                <svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 60 100 C 60 50, 140 50, 140 100 L 140 400 L 60 400 Z" fill="#2c3e50" />
                    <circle cx="100" cy="80" r="40" fill="#1a252f" />
                </svg>
            </div>

        </div>

        <div id="ui-overlay">
            <div id="percentage-text">0.0 <span class="percent-sign">%</span></div>
            <div id="milestone-message"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
