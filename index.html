<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aatm Manthan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="exhibition-scene">
        <div id="sky-background"></div>
        <div id="storm-overlay"></div>

        <canvas id="rain-canvas"></canvas>

        <div id="ground"></div>

        <div id="person-wrapper">

            <div id="person-colorful">
                <img src="/Colourfullpeople.png" alt="colorful">
            </div>

            <div id="person-cover">
                <img src="/WaterGuy.png" alt="Wather Guy">
            </div>

        </div>

        <div id="ui-overlay">
            <div id="percentage-text">0.0 <span class="percent-sign">%</span></div>
            <div id="milestone-message"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
